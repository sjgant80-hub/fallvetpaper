<style>
:root{--void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--ink-2:#22212c;--line:#2a2934;--line-soft:#1f1e28;--cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;--brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--serif:Georgia,'Libre Baskerville',ui-serif,serif;--sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none;font-size:13px}input:focus,textarea:focus,select:focus{border-color:var(--brass)}a{color:var(--brass)}
.app{min-height:100dvh;display:grid;grid-template-rows:48px 1fr}header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}.brand{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--line)}.brand .mark{width:28px;height:28px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--void)}.brand .name{font-family:var(--serif);font-weight:600;font-size:14px}.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase}
nav.tabs{display:flex;flex:1;overflow-x:auto;align-items:stretch}nav.tabs button{padding:0 14px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent}nav.tabs button:hover{background:var(--ink);color:var(--cream)}nav.tabs button.active{background:var(--ink);color:var(--brass);border-top-color:var(--brass)}
.tools-r{display:flex;align-items:center;gap:5px;padding:0 14px;height:100%;border-left:1px solid var(--line)}.tool-btn{padding:5px 11px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
main{padding:18px 22px 60px;overflow-y:auto;max-width:1200px;margin:0 auto;width:100%}
.disclaimer{background:rgba(139,26,26,0.15);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:18px;font-size:12px}.disclaimer strong{color:var(--brass)}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600}.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}.section-h .actions{display:flex;gap:6px}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:16px 18px;margin-bottom:14px}.card h3{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}.field input,.field select,.field textarea{width:100%}.field .hint{font-size:10px;color:var(--cream-muted);margin-top:3px;font-family:var(--mono)}
.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent}.btn:hover{border-color:var(--amber);color:var(--amber)}.btn.brass{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}.btn.brass:hover{background:var(--amber)}.btn.sm{padding:4px 9px;font-size:11px}.btn.ghost{border-color:var(--line);color:var(--cream-dim)}.btn.danger:hover{border-color:var(--red);color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}th,td{padding:7px 10px;border-bottom:1px solid var(--line-soft);text-align:left;vertical-align:top}th{color:var(--brass);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
.pill{display:inline-block;padding:2px 7px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--brass);color:var(--brass)}.pill.draft{border-color:var(--cream-muted);color:var(--cream-muted)}.pill.issued{border-color:var(--green);color:var(--green)}
.tpl-list{display:flex;flex-direction:column;gap:6px}.tpl-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid var(--line);border-radius:3px;cursor:pointer;background:var(--void-2)}.tpl-row:hover{border-color:var(--brass);background:var(--ink)}.tpl-row .nm{font-weight:600;font-size:13px}.tpl-row .sub{font-size:11px;color:var(--cream-muted);font-family:var(--mono)}
.doc-stage{display:grid;grid-template-columns:340px 1fr;gap:18px}.doc-side{display:flex;flex-direction:column;gap:12px}
.section-edit{margin-bottom:8px;border:1px solid var(--line);border-radius:3px;overflow:hidden}.section-edit .hd{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--ink);font-size:12px}.section-edit .nm{font-weight:600}.section-edit .tg{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}.section-edit textarea{width:100%;border:none;border-top:1px solid var(--line);padding:8px 10px;font-size:12px;line-height:1.6;min-height:60px;resize:vertical}.section-edit.locked{border-color:var(--ox)}.section-edit.locked .hd{background:rgba(139,26,26,0.2)}.section-edit.locked .tg{color:var(--ox)}.section-edit.locked textarea{color:var(--cream-dim)}
.paper{background:#faf8f4;color:#1a1611;font-family:Georgia,serif;padding:40px 50px;border-radius:3px;font-size:13px;line-height:1.8;min-height:400px;max-height:80vh;overflow:auto}.paper strong{font-weight:700}.paper .doc-meta{font-family:var(--mono);font-size:10px;color:#888;border-bottom:1px solid #ccc;padding-bottom:8px;margin-bottom:16px}.paper .clause-locked{background:#f0ebd8;border-left:3px solid #8b1a1a;padding:8px 14px;margin:10px 0;font-size:12px}.paper .sig-block{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:24px}.paper .sig-line{border-bottom:1px solid #000;min-height:34px;margin-bottom:4px}.paper .placeholder-empty{color:#c00;background:#fee;padding:0 4px;border-radius:2px;font-family:var(--mono);font-size:11px}
.empty{padding:24px;text-align:center;color:var(--cream-muted);font-style:italic;font-size:12px}
.chat{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding:6px}.msg{padding:10px 14px;border-radius:6px;max-width:88%;font-size:13px;line-height:1.55;white-space:pre-wrap}.msg.user{background:var(--ink);align-self:flex-end}.msg.bot{background:var(--void-2);border:1px solid var(--line);border-left:2px solid var(--brass);align-self:flex-start}.msg .src{font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}.chat-input{display:flex;gap:8px;margin-top:10px}.chat-input input{flex:1;padding:11px 14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:18px;z-index:900;backdrop-filter:blur(4px)}.modal-bg.open{display:flex}.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:4px;padding:22px;max-width:700px;width:100%;max-height:90vh;overflow:auto}.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){nav.tabs button{padding:0 10px;font-size:11px}main{padding:14px 14px 50px}.row{grid-template-columns:1fr}.doc-stage{grid-template-columns:1fr}}
</style>

<header>
  <div class="brand"><div class="mark">◊</div><div><div class="name">FallVetPaper</div></div><div class="seal">v1 · prime 967</div></div>

<script>
'use strict';
const TOOLNAME='fallvetpaper',VERSION='1.0.0',PRIME=967,STORE='fallvetpaper-v1';
const TABS=[{id:'templates',label:'templates'},{id:'generate',label:'generate'},{id:'documents',label:'documents'},{id:'practice',label:'practice'},{id:'clients',label:'clients'},{id:'qa',label:'Q&A'}];

const TEMPLATE_DEFS=[
  {id:'consent-treatment',name:'Consent to Treatment',code:'VCT-01',cat:'consent',desc:'Owner consent for examination, diagnostics, and treatment',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**CONSENT TO EXAMINATION AND TREATMENT**\n\nDate: {{ctx.date}}\n\n**Practice:** {{practice.name}}\n{{practice.address}}'},
    {id:'animal',name:'Animal Details',locked:false,text:'**Animal:** {{animal.name}} ({{animal.species}}, {{animal.breed}})\n**Microchip:** {{animal.microchip}}\n**Owner:** {{client.name}}\n**Contact during procedure:** {{ctx.contactNumber}}'},
    {id:'procedure',name:'Procedure',locked:false,text:'**Proposed procedure / treatment:**\n{{ctx.procedure}}\n\n**Reason:**\n{{ctx.reason}}\n\n**Estimated cost:** {{ctx.estimatedCost}}\n**Cost limit (do not exceed without calling):** {{ctx.costLimit}}'},
    {id:'risks',name:'Risks',locked:true,text:'I understand that:\n\n1. All anaesthetics and procedures carry a degree of risk, including risk of death, even in apparently healthy animals\n2. Pre-anaesthetic blood tests are recommended but not mandatory\n3. Unexpected findings during the procedure may require additional treatment\n4. The practice will attempt to contact me before exceeding the agreed cost limit\n5. I am responsible for all costs incurred\n6. Post-operative complications may occur and may require further treatment at additional cost'},
    {id:'sigs',name:'Signatures',locked:false,text:'[SIGNATURE_BLOCK]'},
   ]},
  {id:'consent-surgery',name:'Consent to Surgery',code:'VCS-01',cat:'consent',desc:'Detailed surgical consent including anaesthesia risks',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**CONSENT TO SURGICAL PROCEDURE**\n\nDate: {{ctx.date}}\nVet: {{ctx.vetName}} (MRCVS)\n\n**Animal:** {{animal.name}} ({{animal.species}}, {{animal.breed}}, {{animal.age}})\n**Owner:** {{client.name}}'},
    {id:'procedure',name:'Procedure',locked:false,text:'**Proposed surgery:** {{ctx.surgery}}\n\n**Pre-operative requirements:**\n- Starve from {{ctx.starveTime}} (water allowed until {{ctx.waterTime}})\n- Pre-anaesthetic blood screen: {{ctx.preAnBlood}}\n\n**Estimated cost range:** {{ctx.costRange}}'},
    {id:'anaesthesia',name:'Anaesthesia',locked:true,text:'**Anaesthesia risks:**\nGeneral anaesthesia carries inherent risks. The RCVS requires that I inform you:\n\n- Overall anaesthetic mortality rate in healthy dogs: approximately 1 in 2,000\n- Overall anaesthetic mortality rate in healthy cats: approximately 1 in 1,000\n- Risk increases with: age, obesity, brachycephalic breeds, pre-existing conditions\n- Your animal will be monitored throughout by trained staff\n- Intravenous fluid therapy is recommended during all general anaesthetics'},
    {id:'additional',name:'Additional',locked:false,text:'**Additional procedures authorised (if clinically indicated):**\n☐ Dental extractions (additional cost per extraction)\n☐ Biopsy submission (histopathology lab fee applies)\n☐ Microchip insertion\n☐ Other: {{ctx.additionalProcedures}}'},
    {id:'sigs',name:'Signatures',locked:false,text:'[SIGNATURE_BLOCK]'},
   ]},
  {id:'euthanasia',name:'Euthanasia Authorisation',code:'VEU-01',cat:'end-of-life',desc:'Owner authorisation for euthanasia and remains handling',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**EUTHANASIA AUTHORISATION**\n\nDate: {{ctx.date}}\n\n**Animal:** {{animal.name}} ({{animal.species}}, {{animal.breed}}, {{animal.age}})\n**Microchip:** {{animal.microchip}}\n**Owner:** {{client.name}}'},
    {id:'authorisation',name:'Authorisation',locked:true,text:'I, the undersigned, being the owner (or authorised agent of the owner) of the above-named animal, hereby authorise the veterinary surgeon to perform euthanasia.\n\nI understand that:\n1. Euthanasia is an irreversible procedure\n2. The veterinary surgeon has discussed the reasons for euthanasia and any alternatives with me\n3. I have had the opportunity to ask questions\n4. This decision is made voluntarily and in what I believe to be the best interests of the animal\n\nThe Animal Welfare Act 2006 places a duty of care on animal owners to ensure that the welfare needs of their animals are met. Euthanasia, when performed by a veterinary surgeon, is a humane and painless procedure.'},
    {id:'remains',name:'Remains',locked:false,text:'**Disposal of remains:**\n\n☐ Individual cremation with ashes returned (cost: {{ctx.cremationIndividual}})\n☐ Communal cremation (cost: {{ctx.cremationCommunal}})\n☐ Practice disposal\n☐ I wish to take the remains home\n\n**Memorials/paw print:** {{ctx.memorial}}'},
    {id:'sigs',name:'Signatures',locked:false,text:'[SIGNATURE_BLOCK]'},
   ]},
  {id:'referral',name:'Veterinary Referral Letter',code:'VRF-01',cat:'clinical',desc:'Referral to specialist or referral hospital',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**VETERINARY REFERRAL**\n\nDate: {{ctx.date}}\nUrgency: {{ctx.urgency}}\n\nFrom: {{practice.name}}, {{practice.address}}\nReferring vet: {{ctx.referringVet}} MRCVS\n\nTo: {{ctx.referTo}}\nDepartment: {{ctx.department}}'},
    {id:'animal',name:'Animal',locked:false,text:'**Animal:** {{animal.name}}\n**Species/Breed:** {{animal.species}} / {{animal.breed}}\n**Age:** {{animal.age}} · **Sex:** {{animal.sex}} · **Neutered:** {{animal.neutered}}\n**Weight:** {{ctx.weight}}\n**Microchip:** {{animal.microchip}}\n**Owner:** {{client.name}} ({{client.phone}})'},
    {id:'clinical',name:'Clinical Summary',locked:false,text:'**Presenting complaint:**\n{{ctx.presentingComplaint}}\n\n**Duration:**\n{{ctx.duration}}\n\n**Clinical findings:**\n{{ctx.clinicalFindings}}\n\n**Diagnostics performed:**\n{{ctx.diagnostics}}\n\n**Treatment to date:**\n{{ctx.treatmentToDate}}\n\n**Current medications:**\n{{ctx.currentMeds}}'},
    {id:'request',name:'Request',locked:false,text:'**Reason for referral:**\n{{ctx.reasonForReferral}}\n\n**Specific questions:**\n{{ctx.questions}}'},
    {id:'footer',name:'Footer',locked:true,text:'This referral is made with the informed consent of the owner. Please contact the referring practice if further information is required.\n\nThe owner is aware that referral fees are separate from, and in addition to, first-opinion fees.'},
   ]},
  {id:'discharge',name:'Discharge Instructions',code:'VDI-01',cat:'clinical',desc:'Post-operative / post-treatment discharge instructions',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**DISCHARGE INSTRUCTIONS**\n\nDate: {{ctx.date}}\n\n**Animal:** {{animal.name}} ({{animal.species}})\n**Owner:** {{client.name}}\n**Procedure/Treatment:** {{ctx.procedure}}'},
    {id:'post-op',name:'Post-operative Care',locked:false,text:'**Restrictions:**\n{{ctx.restrictions}}\n\n**Exercise:** {{ctx.exercise}}\n\n**Wound care:** {{ctx.woundCare}}\n\n**Collar/buster collar:** {{ctx.collar}}\n\n**Feeding:** {{ctx.feeding}}'},
    {id:'medications',name:'Medications',locked:false,text:'**Medications to give at home:**\n\n{{ctx.medications}}\n\n**Pain relief:** {{ctx.painRelief}}'},
    {id:'followup',name:'Follow-up',locked:false,text:'**Re-check appointment:** {{ctx.recheckDate}}\n\n**Suture/staple removal:** {{ctx.sutureRemoval}}'},
    {id:'emergency',name:'Emergency',locked:true,text:'**Contact us immediately if:**\n- Excessive bleeding, swelling, or discharge from the wound\n- Your pet is not eating or drinking within 24 hours\n- Your pet appears to be in significant pain despite pain relief\n- Vomiting or diarrhoea persists for more than 24 hours\n- Your pet becomes lethargic or unresponsive\n- Breathing difficulties\n\n**Emergency contact:** {{practice.phone}}\nOut of hours: {{ctx.oohNumber}}'},
   ]},
  {id:'vaccination',name:'Vaccination Certificate',code:'VVC-01',cat:'preventive',desc:'Primary and booster vaccination record',
   sections:[
    {id:'cert',name:'Certificate',locked:false,text:'**VACCINATION CERTIFICATE**\n\n**Animal:** {{animal.name}}\n**Species/Breed:** {{animal.species}} / {{animal.breed}}\n**DOB:** {{animal.dob}}\n**Microchip:** {{animal.microchip}}\n**Colour/Markings:** {{animal.colour}}\n**Owner:** {{client.name}}, {{client.address}}'},
    {id:'vaccines',name:'Vaccines Administered',locked:false,text:'**Date:** {{ctx.vaccineDate}}\n**Vaccine:** {{ctx.vaccineName}}\n**Batch no:** {{ctx.batchNo}}\n**Expiry:** {{ctx.vaccineExpiry}}\n**Next due:** {{ctx.nextDue}}\n\n**Administered by:** {{ctx.vetName}} MRCVS\n**Practice stamp:** {{practice.name}}'},
    {id:'note',name:'Note',locked:true,text:'This certificate confirms that the above-named animal has received the vaccination(s) listed. Vaccinations should be kept up to date in accordance with the manufacturer\'s data sheet. This certificate does not guarantee immunity. Travel vaccinations (including rabies) require separate APHA/DEFRA pet passport documentation.'},
   ]},
  {id:'insurance-claim',name:'Insurance Claim Form',code:'VIC-01',cat:'admin',desc:'Veterinary section of pet insurance claim',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**VETERINARY CERTIFICATE — INSURANCE CLAIM**\n\nDate: {{ctx.date}}\nInsurer: {{ctx.insurer}}\nPolicy number: {{ctx.policyNumber}}\nClaim number: {{ctx.claimNumber}}'},
    {id:'animal',name:'Animal',locked:false,text:'**Animal:** {{animal.name}}\n**Species/Breed:** {{animal.species}} / {{animal.breed}}\n**Age:** {{animal.age}} · **Sex:** {{animal.sex}}\n**Microchip:** {{animal.microchip}}\n**Owner:** {{client.name}}'},
    {id:'clinical',name:'Clinical Details',locked:false,text:'**Date symptoms first noticed by owner:** {{ctx.symptomDate}}\n**Date first presented:** {{ctx.presentedDate}}\n**Is this a pre-existing condition?** {{ctx.preExisting}}\n\n**Diagnosis:** {{ctx.diagnosis}}\n\n**Treatment provided:**\n{{ctx.treatment}}\n\n**Prognosis:** {{ctx.prognosis}}'},
    {id:'costs',name:'Costs',locked:false,text:'**Itemised costs:**\n{{ctx.itemisedCosts}}\n\n**Total claim:** {{ctx.totalClaim}}\n**Excess:** {{ctx.excess}}\n**Amount payable:** {{ctx.amountPayable}}'},
    {id:'declaration',name:'Declaration',locked:true,text:'I certify that the information provided is accurate and complete to the best of my knowledge. The treatment described was clinically necessary for the condition diagnosed.\n\nI understand that providing false or misleading information constitutes fraud under the Fraud Act 2006.'},
    {id:'sig',name:'Signature',locked:false,text:'**Veterinary surgeon:** {{ctx.vetName}} MRCVS\n**RCVS number:** {{ctx.rcvsNumber}}\n[SIGNATURE_BLOCK]'},
   ]},
  {id:'cd-register',name:'Controlled Drug Register Entry',code:'VCD-01',cat:'prescribing',desc:'Misuse of Drugs Regulations 2001 — Schedule 2 CD register',
   sections:[
    {id:'entry',name:'Register Entry',locked:false,text:'**CONTROLLED DRUG REGISTER**\n\nDate: {{ctx.date}}\n\n**Drug:** {{ctx.drugName}}\n**Schedule:** {{ctx.schedule}}\n**Form:** {{ctx.form}}\n**Strength:** {{ctx.strength}}'},
    {id:'supply',name:'Supply/Administration',locked:false,text:'**Supplied/administered to:** {{animal.name}} ({{client.name}})\n**Amount:** {{ctx.amount}}\n**Running balance:** {{ctx.runningBalance}}\n\n**Authorised by:** {{ctx.vetName}} MRCVS'},
    {id:'legal',name:'Legal Requirements',locked:true,text:'Misuse of Drugs Regulations 2001 (as amended):\n\n- Schedule 2 CDs: register must be maintained, entries made on day of transaction or next day\n- Register must be bound (or computerised per Home Office approval), indelible entries\n- Separate page per drug and strength\n- Running balance recommended (mandatory from 2006 amendments)\n- Annual stock check and destruction witnessed by authorised person\n- Safe/cabinet meeting BS2881 security requirements\n- Records retained for 2 years from date of last entry\n\nRCVS guidance: quarterly stock reconciliation recommended.'},
   ]},
  {id:'clinical-notes',name:'Clinical Notes Template',code:'VCN-01',cat:'clinical',desc:'SOAP-format clinical note for patient record',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**CLINICAL NOTES**\n\nDate: {{ctx.date}} · Time: {{ctx.time}}\nVet: {{ctx.vetName}} MRCVS\n\n**Animal:** {{animal.name}} ({{animal.species}}, {{animal.breed}}, {{animal.age}})\n**Owner:** {{client.name}}\n**Weight:** {{ctx.weight}}'},
    {id:'soap',name:'SOAP',locked:false,text:'**S — Subjective (history):**\n{{ctx.subjective}}\n\n**O — Objective (examination):**\nTemp: {{ctx.temp}} · HR: {{ctx.hr}} · RR: {{ctx.rr}} · BCS: {{ctx.bcs}}/9\n{{ctx.examination}}\n\n**A — Assessment:**\n{{ctx.assessment}}\n\n**P — Plan:**\n{{ctx.plan}}'},
    {id:'meds',name:'Medications Dispensed',locked:false,text:'{{ctx.medications}}'},
   ]},
  {id:'estimate',name:'Treatment Estimate',code:'VTE-01',cat:'admin',desc:'Itemised cost estimate for owner approval',
   sections:[
    {id:'header',name:'Header',locked:false,text:'**TREATMENT ESTIMATE**\n\nDate: {{ctx.date}}\n\n**Animal:** {{animal.name}} ({{animal.species}})\n**Owner:** {{client.name}}\n**Condition:** {{ctx.condition}}'},
    {id:'items',name:'Itemised Costs',locked:false,text:'{{ctx.items}}\n\n**Estimated total (excl. VAT):** {{ctx.subtotal}}\n**VAT (20%):** {{ctx.vat}}\n**Estimated total (incl. VAT):** {{ctx.total}}\n\nThis is an estimate only. Actual costs may vary depending on clinical findings.'},
    {id:'payment',name:'Payment',locked:true,text:'Payment is due at the time of treatment or discharge. We accept cash, card, and bank transfer. Payment plans may be available — please ask at reception.\n\nIf you have pet insurance, you are responsible for payment in full. We can provide a completed claim form and direct payment may be available with selected insurers.'},
    {id:'sigs',name:'Approval',locked:false,text:'I have read and understood this estimate and authorise the practice to proceed with treatment.\n\n[SIGNATURE_BLOCK]'},
   ]},
];

let state={active:'templates',firm:null,clients:[],documents:[],audit:[],
  ui:{selectedTemplate:null,selectedClient:null,editingSections:{},extraContext:'',chat:[]},
  settings:{anthropicKey:'',auditChain:true}};

const $=(s,p=document)=>p.querySelector(s);const uid=p=>(p||'')+'_'+Math.random().toString(36).slice(2,11);const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dateStr=ts=>{if(!ts)return '—';return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})};
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;['state','audit','clients','firms','documents'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='state'?undefined:'id'})})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=rej})}
function idbGetAll(s){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([])})}
function idbGet(s,k){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null)})}
function idbPut(s,v,k){return new Promise(res=>{const tx=db.transaction(s,'readwrite');const o=tx.objectStore(s);const q=k!=null?o.put(v,k):o.put(v);q.onsuccess=()=>res(true);q.onerror=()=>res(false)})}
async function loadAll(){if(!db)await openDB();const[firms,clients,docs,auditArr,uiState]=await Promise.all([idbGetAll('firms'),idbGetAll('clients'),idbGetAll('documents'),idbGetAll('audit'),idbGet('state','ui')]);state.firm=firms[0]||null;state.clients=clients;state.documents=docs;state.audit=auditArr.sort((a,b)=>a.i-b.i);if(uiState){state.ui=Object.assign({},state.ui,uiState.value||{});state.settings=Object.assign({},state.settings,uiState.settings||{})}}
async function persistUI(){await idbPut('state',{value:{...state.ui},settings:state.settings},'ui')}
async function auditLog(action,opts={}){if(!state.settings.auditChain)return;const prev=state.audit.length?state.audit[state.audit.length-1]:null;const i=(prev?prev.i:0)+1;const entry={id:uid('au'),i,ts:now(),tool:TOOLNAME,action,reasoning:opts.reasoning||'',configVersion:TOOLNAME+'@'+VERSION,prevHash:prev?.docHash||'',docHash:'',payload:opts.payload||{}};entry.docHash=await sha256(JSON.stringify({i,ts:entry.ts,action,prevHash:entry.prevHash,payload:entry.payload}));state.audit.push(entry);await idbPut('audit',entry)}

let bcVet,bcSignal;
function initMesh(){try{bcSignal=new BroadcastChannel('fall-signal');bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()})}catch(e){}try{bcVet=new BroadcastChannel('fall-vet');bcVet.addEventListener('message',async e=>{const m=e.data;if(!m||m.source===TOOLNAME)return;if(m.type==='sync.snapshot'){const p=m.payload||{};if(Array.isArray(p.clients))for(const c of p.clients){if(!state.clients.find(x=>x.id===c.id)){state.clients.push(c);await idbPut('clients',c)}}if(p.firm&&!state.firm){state.firm=p.firm;await idbPut('firms',p.firm)}render()}});bcVet.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME})}catch(e){}}

function buildContext(){
  const f=state.firm||{};const cl=state.ui.selectedClient?state.clients.find(c=>c.id===state.ui.selectedClient):null;
  const map={'practice.name':f.name||'','practice.address':f.address||'','practice.phone':f.phone||'','practice.email':f.email||''};
  if(cl){map['client.name']=cl.ownerName||((cl.title||'')+' '+(cl.firstName||'')+' '+(cl.lastName||'')).trim()||'';map['client.phone']=cl.phone||'';map['client.address']=cl.address||'';
    const a=(cl.animals||[])[0]||{};map['animal.name']=a.name||'';map['animal.species']=a.species||'';map['animal.breed']=a.breed||'';map['animal.age']=a.age||'';map['animal.sex']=a.sex||'';map['animal.neutered']=a.neutered||'';map['animal.microchip']=a.microchip||'';map['animal.dob']=a.dob||'';map['animal.colour']=a.colour||''}
  const extra=(state.ui.extraContext||'').split('\n');for(const line of extra){const eq=line.indexOf('=');if(eq>0)map['ctx.'+line.slice(0,eq).trim()]=line.slice(eq+1).trim()}
  return map;
}
function resolveText(text,ctx){return text.replace(/\{\{([^}]+)\}\}/g,(_,key)=>{const v=ctx[key.trim()];return v!=null&&v!==''?String(v):`<span class="placeholder-empty">{{${key.trim()}}}</span>`})}
function renderPaper(tpl,ctx,sections){return `<div class="doc-meta">${esc(tpl.name)} · ${esc(tpl.code)} · ${TOOLNAME} · ${dateStr(now())}</div>\n`+sections.map(s=>{const text=state.ui.editingSections?.[s.id]??s.text;const html=resolveText(text,ctx);if(s.locked)return `<div class="clause-locked">${mdB(html)}</div>`;return mdB(html)}).join('\n')}
function mdB(md){return md.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n(\d+\.\s)/g,'<br>$1').replace(/\n-\s/g,'<br>• ').replace(/☐/g,'<span style="font-size:16px">☐</span>').replace(/\[SIGNATURE_BLOCK\]/g,'<div class="sig-block"><div><div class="sig-line"></div>Signed (Vet)</div><div><div class="sig-line"></div>Signed (Owner)</div></div>').replace(/^/,'<p>').replace(/$/,'</p>')}

function render(){$('#tabNav').innerHTML=TABS.map(t=>`<button class="${state.active===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');const v=$('#view');switch(state.active){case 'templates':return renderTemplates(v);case 'generate':return renderGenerate(v);case 'documents':return renderDocuments(v);case 'practice':return renderPractice(v);case 'clients':return renderClients(v);case 'qa':return renderQA(v)}}
function switchTab(id){state.active=id;persistUI();render()}

function renderTemplates(v){const cats=[...new Set(TEMPLATE_DEFS.map(t=>t.cat))];v.innerHTML=`<div class="disclaimer"><strong>◊ Regulatory notice:</strong> FallVetPaper generates veterinary clinical documents shaped by the Veterinary Surgeons Act 1966, RCVS Code of Professional Conduct, and Misuse of Drugs Regulations 2001. Locked clauses contain regulatory wording. All clinical decisions remain the responsibility of the attending MRCVS. Data never leaves this device.</div><div class="section-h"><h2>Templates</h2><div class="sub">${TEMPLATE_DEFS.length} templates</div></div>${cats.map(cat=>`<h3 style="font-family:var(--serif);margin:14px 0 8px;color:var(--brass);text-transform:capitalize">${cat}</h3><div class="tpl-list" style="margin-bottom:14px">${TEMPLATE_DEFS.filter(t=>t.cat===cat).map(t=>`<div class="tpl-row" onclick="selectTemplate('${t.id}')"><div><div class="nm">${esc(t.name)}</div><div class="sub">${esc(t.code)} · ${esc(t.desc)}</div></div><div class="sub">${t.sections.length} sections</div></div>`).join('')}</div>`).join('')}`}
function selectTemplate(id){state.ui.selectedTemplate=id;state.ui.editingSections={};state.active='generate';persistUI();render()}
function renderGenerate(v){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl){v.innerHTML='<div class="empty">Select a template from the Templates tab.</div>';return}const ctx=buildContext();v.innerHTML=`<div class="section-h"><h2>${esc(tpl.name)}</h2><div class="actions"><button class="btn brass sm" onclick="saveDocument('draft')">Save draft</button><button class="btn sm" style="border-color:var(--green);color:var(--green)" onclick="saveDocument('issued')">Issue</button><button class="btn ghost sm" onclick="printDoc()">Print</button></div></div><div class="doc-stage"><div class="doc-side"><div class="card"><h3>Client/Animal</h3><select id="clientSelect" style="width:100%" onchange="state.ui.selectedClient=this.value;persistUI();render()"><option value="">— select —</option>${state.clients.map(c=>{const n=c.ownerName||((c.title||'')+' '+(c.firstName||'')+' '+(c.lastName||'')).trim()||c.id.slice(0,8);return `<option value="${c.id}" ${state.ui.selectedClient===c.id?'selected':''}>${esc(n)}</option>`}).join('')}</select></div><div class="card"><h3>Extra Context</h3><textarea id="ctxArea" rows="6" style="width:100%;font-size:11px" oninput="state.ui.extraContext=this.value">${esc(state.ui.extraContext||'')}</textarea><div class="field"><div class="hint">key=value per line</div></div></div><div class="card"><h3>Sections</h3>${tpl.sections.map(s=>`<div class="section-edit ${s.locked?'locked':''}"><div class="hd"><span class="nm">${esc(s.name)}</span><span class="tg">${s.locked?'locked':'editable'}</span></div><textarea rows="4" ${s.locked?'readonly':''} onchange="state.ui.editingSections['${s.id}']=this.value;renderPreview()">${esc(state.ui.editingSections?.[s.id]??s.text)}</textarea></div>`).join('')}</div></div><div><div class="paper" id="paperPreview">${renderPaper(tpl,ctx,tpl.sections)}</div></div></div>`}
function renderPreview(){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl)return;const pp=$('#paperPreview');if(pp)pp.innerHTML=renderPaper(tpl,buildContext(),tpl.sections)}
async function saveDocument(status){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl){toast('No template');return}const content=renderPaper(tpl,buildContext(),tpl.sections);const hash=await sha256(content);const doc={id:uid('doc'),templateId:tpl.id,templateName:tpl.name,code:tpl.code,clientId:state.ui.selectedClient||'',status,content,hash:hash.slice(0,16),createdAt:now(),sections:{...state.ui.editingSections},extraContext:state.ui.extraContext||''};state.documents.push(doc);await idbPut('documents',doc);await auditLog('document.'+status,{reasoning:tpl.name,payload:{docId:doc.id,hash:doc.hash}});toast(status==='issued'?'Issued':'Draft saved');persistUI();render()}
function printDoc(){const pp=$('#paperPreview');if(!pp)return;const w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><title>Print</title><style>body{font-family:Georgia,serif;font-size:13px;line-height:1.7;padding:40px 60px;color:#1a1611}strong{font-weight:700}.clause-locked{background:#f5f0e0;border-left:3px solid #8b1a1a;padding:8px 12px;margin:8px 0;font-size:12px}.sig-block{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:30px}.sig-line{border-bottom:1px solid #000;min-height:38px;margin-bottom:4px}@media print{body{padding:20px}}</style></head><body>'+pp.innerHTML+'</body></html>');w.document.close();w.print()}
function renderDocuments(v){const docs=state.documents.sort((a,b)=>b.createdAt-a.createdAt);v.innerHTML=`<div class="section-h"><h2>Documents</h2><div class="sub">${docs.length}</div></div>${docs.length?`<table><thead><tr><th>Date</th><th>Template</th><th>Code</th><th>Status</th><th>Hash</th></tr></thead><tbody>${docs.map(d=>`<tr><td>${dateStr(d.createdAt)}</td><td>${esc(d.templateName)}</td><td>${esc(d.code)}</td><td><span class="pill ${d.status}">${d.status}</span></td><td style="font-family:var(--mono);font-size:10px;color:var(--cream-muted)">${esc(d.hash)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No documents.</div>'}`}
function renderPractice(v){const f=state.firm||{};v.innerHTML=`<div class="section-h"><h2>Practice Setup</h2></div><div class="card" style="max-width:620px"><div class="row"><div class="field"><label>Practice name</label><input id="fName" value="${esc(f.name||'')}"></div><div class="field"><label>Email</label><input id="fEmail" value="${esc(f.email||'')}"></div></div><div class="field"><label>Address</label><input id="fAddr" value="${esc(f.address||'')}"></div><div class="row"><div class="field"><label>Phone</label><input id="fPhone" value="${esc(f.phone||'')}"></div><div class="field"><label>RCVS Practice no</label><input id="fRcvs" value="${esc(f.rcvsNumber||'')}"></div></div><button class="btn brass" onclick="savePracticeForm()" style="margin-top:8px">Save</button></div>`}
async function savePracticeForm(){const f=state.firm||{id:uid('fi'),ts:now()};f.name=$('#fName').value.trim();f.email=$('#fEmail').value.trim();f.address=$('#fAddr').value.trim();f.phone=$('#fPhone').value.trim();f.rcvsNumber=$('#fRcvs').value.trim();f.updatedAt=now();state.firm=f;await idbPut('firms',f);await auditLog('practice.saved');toast('Saved');render()}
function renderClients(v){v.innerHTML=`<div class="section-h"><h2>Clients</h2><div class="sub">${state.clients.length}</div></div>${state.clients.length?`<table><thead><tr><th>Owner</th><th>Animal</th><th>Species</th></tr></thead><tbody>${state.clients.map(c=>{const n=c.ownerName||((c.title||'')+' '+(c.firstName||'')+' '+(c.lastName||'')).trim()||c.id.slice(0,8);const a=(c.animals||[])[0]||{};return `<tr><td>${esc(n)}</td><td>${esc(a.name||'—')}</td><td>${esc(a.species||'—')}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">Clients sync from fallvetonboard.</div>'}`}

const T0_QA=[
  {q:/consent|informed|owner/i,a:'RCVS Code of Professional Conduct (Chapter 11): obtain informed consent before treatment. Explain: diagnosis, prognosis, treatment options, risks, costs. Consent should be documented. Emergency: treat without consent if in the animal\'s best interest and owner cannot be contacted. Under 16: parental consent required. Non-owner presenting: establish authority to consent.'},
  {q:/euthanasia|put.?down|pts/i,a:'Animal Welfare Act 2006: euthanasia must be carried out humanely. RCVS: euthanasia is a clinical decision — can refuse if not in the animal\'s interest, but cannot refuse if animal is suffering and no alternative. Methods: IV barbiturate injection (pentobarbitone). Schedule 2 CD — record in register. Owner consent should be documented. Remains: offer individual/communal cremation or owner to take home.'},
  {q:/controlled.?drug|cd|schedule|register/i,a:'Misuse of Drugs Regulations 2001: vets can possess, supply, and administer Schedule 2-5 CDs. Schedule 2 (ketamine, methadone, morphine, pethidine): bound register, safe storage (BS2881), running balance, annual stockcheck, destruction witnessed. Schedule 3 (buprenorphine, midazolam): safe custody required, no register needed. Schedule 4 (diazepam, zolazepam): invoice records only. Quarterly reconciliation recommended by RCVS.'},
  {q:/referral|specialist|second.?opinion/i,a:'RCVS Code 3: client has right to seek a second opinion or referral. Vet should refer when case is beyond competence. Referral letter should include: signalment, history, clinical findings, diagnostics, treatment to date, reason for referral. Referral does not transfer clinical responsibility until the referral practice accepts the case. Referral fees are the client\'s responsibility.'},
  {q:/vaccination|vaccine|titre/i,a:'WSAVA vaccination guidelines: core vaccines (dogs: DHP; cats: FPV, FHV, FCV) — primary course + 12-month booster, then every 3 years. Non-core based on risk. Titre testing available as alternative to booster vaccination. Rabies: required for APHA Pet Passport (travel). No UK legal requirement for vaccination (unlike some countries). Record batch number, expiry, and site.'},
  {q:/insurance|claim|pre.?existing/i,a:'Vet completes the clinical section of the insurance claim form. Must be accurate and complete. Pre-existing conditions: must disclose to insurer. Common issues: policy exclusions, excess, co-payment, annual/lifetime limits. Direct claims: some insurers pay practice directly. Vet cannot refuse to complete a claim form. Fee chargeable for completion. Fraud Act 2006 applies to false claims.'},
  {q:/rcvs|code|conduct|fitness/i,a:'RCVS (Royal College of Veterinary Surgeons) regulates the veterinary profession. Code of Professional Conduct: 10 principles. Fitness to Practise: disciplinary committee can warn, suspend, or remove from register. Annual renewal fee required. Practice Standards Scheme: voluntary accreditation (Core, GP, Hospital). CPD: minimum 35 hours over 3 years (RCVS requirement).'},
  {q:/record|clinical|notes|soap/i,a:'RCVS requires adequate clinical records. SOAP format recommended: Subjective (history), Objective (examination), Assessment (diagnosis), Plan (treatment). Records must include: date, animal ID, owner, clinical findings, treatment, medications dispensed, consent obtained. Retain for minimum 7 years. Digital records: must be backed up. Records belong to the practice, not the client — but client has right to request copies.'},
];
function askT0(q){for(const r of T0_QA){if(r.q.test(q))return {answer:r.a,source:'T0 · UK veterinary rules'}}return null}
async function askT3(q){if(!state.settings.anthropicKey)return null;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.settings.anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'You are a UK veterinary practice expert. RCVS, VSA 1966, controlled drugs, animal welfare. Concise.\n\n'+q}]})});if(!res.ok)return null;const j=await res.json();return {answer:j.content?.[0]?.text,source:'T3 · Anthropic'}}catch(e){return null}}
function renderQA(v){v.innerHTML=`<div class="section-h"><h2>Q & A</h2><div class="sub">T0 + T3 BYOK</div></div><div class="card" style="max-width:780px"><div class="chat" id="chatBox">${(state.ui.chat||[]).map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}</div><div class="chat-input"><input id="chatIn" placeholder="Ask… 'CD register requirements?' · 'euthanasia consent?' · 'RCVS CPD?'" onkeydown="if(event.key==='Enter')askQ()"><button class="btn brass" onclick="askQ()">Ask</button></div></div>`;const box=$('#chatBox');if(box)box.scrollTop=box.scrollHeight}
async function askQ(){const inp=$('#chatIn');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';if(!state.ui.chat)state.ui.chat=[];state.ui.chat.push({role:'user',text:q});render();let r=askT0(q);if(!r)r=await askT3(q);state.ui.chat.push(r?{role:'bot',text:r.answer,source:r.source}:{role:'bot',text:'No T0 match. Add BYOK key for T3.',source:'system'});persistUI();render()}

function openModal(type){const modal=$('#modal');$('#modalTitle').textContent='Settings';modal.classList.add('open');$('#modalBody').innerHTML=`<div class="field"><label>Anthropic key (T3)</label><input type="password" id="sKey" value="${esc(state.settings.anthropicKey||'')}"></div><div style="margin:10px 0"><label style="font-size:12px"><input type="checkbox" id="sAudit" ${state.settings.auditChain?'checked':''}> Audit chain</label></div><div class="actions"><button class="btn ghost sm" onclick="exportAll()">Export</button><button class="btn ghost sm" onclick="importAll()">Import</button><button class="btn danger sm" onclick="wipeAll()">Wipe</button><button class="btn brass" onclick="saveSettings()">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`}
function closeModal(){$('#modal').classList.remove('open')}
function saveSettings(){state.settings.anthropicKey=$('#sKey').value.trim();state.settings.auditChain=$('#sAudit').checked;$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';persistUI();closeModal();toast('Saved');render()}
function exportAll(){const d={tool:TOOLNAME,v:VERSION,ts:now(),firm:state.firm,clients:state.clients,documents:state.documents};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fallvetpaper-export.json';a.click();URL.revokeObjectURL(u);toast('Exported')}
function importAll(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async()=>{const f=inp.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.firm){state.firm=d.firm;await idbPut('firms',d.firm)}for(const k of['clients','documents']){if(Array.isArray(d[k]))for(const r of d[k]){state[k].push(r);await idbPut(k,r)}}persistUI();toast('Imported');render()}catch(e){toast('Failed')}};inp.click()}
async function wipeAll(){if(!confirm('Wipe ALL data?'))return;for(const s of['clients','firms','documents','audit','state']){const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();await new Promise(r=>{tx.oncomplete=r})}location.reload()}

async function seedDemo(){if(state.clients.length||state.firm)return;
  const firm={id:uid('fi'),name:'Demo Veterinary Practice',address:'3 Green Lane, London SW6 4AB',email:'info@demovets.co.uk',phone:'020 7890 1234',rcvsNumber:'XVP-12345',updatedAt:now(),isDemo:true};
  state.firm=firm;await idbPut('firms',firm);
  const c1={id:uid('cl'),ownerName:'Sarah Mitchell',phone:'07700 900111',email:'s.mitchell@email.co.uk',address:'42 Park Road, London SW6 5QR',animals:[{name:'Max',species:'Dog',breed:'Labrador Retriever',age:'6 years',sex:'Male',neutered:'Yes',microchip:'981234567890123',colour:'Golden',dob:'2020-03-15'}],ts:now(),isDemo:true};
  const c2={id:uid('cl'),ownerName:'David Chen',phone:'07700 900222',email:'d.chen@email.co.uk',address:'15 Elm Street, London SW6 3TT',animals:[{name:'Luna',species:'Cat',breed:'British Shorthair',age:'3 years',sex:'Female',neutered:'Yes',microchip:'981987654321098',colour:'Blue',dob:'2023-01-10'}],ts:now(),isDemo:true};
  state.clients.push(c1,c2);await idbPut('clients',c1);await idbPut('clients',c2);
  await auditLog('demo.seeded',{reasoning:'first boot'});await persistUI()}

(async function boot(){try{await openDB();await loadAll();await seedDemo();initMesh();$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';render()}catch(e){console.error('[fallvetpaper] boot error:',e);document.getElementById('view').innerHTML='<div class="empty">Boot error: '+esc(e.message)+'</div>'}})();
</script>
