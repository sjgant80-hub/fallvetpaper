<script>
/*!
 * Fall Kit · v1.0.0 · the shared cascade for every estate seed
 * MIT · Simon Gant · ai-nativesolutions.com · ◊·κ=1
 *
 * Inlineable JS module. Drop into any seed via <script> or copy-paste inline.
 * Preserves single-HTML sovereignty (no external deps until user opts in to T2 WebLLM).
 *
 * What it gives every seed:
 *  - AI tier picker: T0 (off · default) · T2 (WebLLM in-browser, 5 models 1B-70B) · T3 (BYOK Anthropic/OpenAI/Google)
 *  - Universal entry: FallKit.aiComplete(systemPrompt, userMsg, maxTokens) → string|null
 *  - AI chip UI in header
 *  - WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN)
 *  - Help section partial: FallKit.helpSection()
 *  - Settings panel: FallKit.openSettings()
 *
 * Doctrine (per botler CLAUDE.md):
 *  - T0 fallback ALWAYS works · aiComplete returns null · caller MUST degrade gracefully
 *  - NEVER hide a feature behind AI · NEVER proxy API keys · NEVER log keys
 *  - WebLLM is lazy-loaded · model weights download ONLY on user opt-in
 *
 * Estate-first canonical references:
 *  - WebLLM pattern: Downloads/botler/index.html (T0/T2/T3 cascade)
 *  - WebRTC pattern: Downloads/fallnet/fallnet-shim.js (raw RTCPeerConnection)
 *  - Konomi seal:    ◊·κ=1  (consistent across all estate seeds)
 *  - Mesh channel:   'fall-signal'
 */
(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.1.0';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;
  }

  // ─── Toast ───────────────────────────────────────────────────────
  function notify(msg, kind) {
    let t = $('#fk-toast');
    if (!t) {
      t = document.createElement('div'); t.id = 'fk-toast';
      t.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:#c08a3a;color:#0a0a0a;padding:9px 18px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;opacity:0;transition:all .22s;z-index:10000;pointer-events:none';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';
    t.style.color = kind === 'err' ? '#fff' : '#0a0a0a';
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; }, 2400);
  }

  // ─── Settings modal ──────────────────────────────────────────────
  function openSettings() {
    let bg = $('#fk-modal-bg');
    if (!bg) {
      bg = document.createElement('div'); bg.id = 'fk-modal-bg';
      bg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px;overflow-y:auto;z-index:9999';
      bg.onclick = e => { if (e.target.id === 'fk-modal-bg') closeSettings(); };
      document.body.appendChild(bg);
    }
    const tier = aiTier();
    const provider = STATE.config.api_provider || 'anthropic';
    const providerCfg = T3_PROVIDERS[provider];
    bg.innerHTML = `
      <div style="background:#13121a;border:1px solid #c08a3a;border-radius:5px;max-width:600px;width:100%;padding:22px 24px;color:#ebe3d2;font-family:system-ui,-apple-system,sans-serif;font-size:13.5px;line-height:1.55">
        <h3 style="font-family:Georgia,serif;font-size:18px;color:#c08a3a;margin-bottom:14px">◊ Fall Kit · AI cascade settings</h3>

            ${Object.entries(WEBLLM_MODELS).map(([k,m]) => `<option value="${k}"${(STATE.config.webllm_model||DEFAULT_MODEL)===k?' selected':''}>${esc(m.label)} · ${esc(m.size)}</option>`).join('')}

        <div id="fk-t3-block" style="display:${tier==='T3'?'block':'none'};margin-bottom:14px;padding:12px 14px;background:#1a1922;border:1px solid #2a2934;border-radius:4px">

            ${Object.entries(T3_PROVIDERS).map(([k,p]) => `<option value="${k}"${provider===k?' selected':''}>${esc(p.label)}</option>`).join('')}

            ${providerCfg.models.map(m => `<option value="${m}"${(STATE.config.api_model||providerCfg.default)===m?' selected':''}>${esc(m)}</option>`).join('')}

          <div style="margin-top:8px;font-size:11px;color:#6e6a5e;line-height:1.55">Key lives in this browser only (localStorage). Sent direct to the provider — never to us. Wipe with Reset.</div>
        </div>
        <div style="margin-bottom:14px;padding:12px 14px;background:#1a1922;border:1px solid #2a2934;border-radius:4px">
          <label style="display:block;font-size:11px;color:#a89e88;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase">Cross-seed mesh</label>
          <div style="display:flex;gap:8px;align-items:center">
            <button id="fk-mesh-toggle" style="padding:6px 12px;background:${STATE.mesh.active?'#6b8d4a':'#1a1922'};color:${STATE.mesh.active?'#fff':'#a89e88'};border:1px solid ${STATE.mesh.active?'#6b8d4a':'#3a342c'};border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit">${STATE.mesh.active?'✓ Active · disconnect':'Activate mesh'}</button>
            <span style="font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#6e6a5e;letter-spacing:.04em">channel · <code style="background:#22212c;padding:1px 5px;border-radius:2px">${MESH_CHANNEL}</code></span>
          </div>
          <div style="margin-top:8px;font-size:11px;color:#6e6a5e;line-height:1.55">BroadcastChannel for same-device · WebRTC for cross-device (planned). Other estate seeds on the same channel discover each other automatically.</div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
          <button onclick="FallKit.closeSettings()" style="padding:7px 14px;background:transparent;color:#a89e88;border:1px solid #3a342c;border-radius:3px;font-size:12px;cursor:pointer;font-family:inherit">Close</button>
          <button id="fk-save" style="padding:7px 14px;background:#c08a3a;color:#0a0a0a;border:none;border-radius:3px;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit">Save</button>
        </div>

      </div>`;
    // Wire interactions
    $('#fk-tier').onchange = () => {
      const t = $('#fk-tier').value;
      $('#fk-t2-block').style.display = t === 'T2' ? 'block' : 'none';
      $('#fk-t3-block').style.display = t === 'T3' ? 'block' : 'none';
    };
    $('#fk-provider') && ($('#fk-provider').onchange = () => {
      const p = $('#fk-provider').value;
      const sel = $('#fk-api-model');
      sel.innerHTML = T3_PROVIDERS[p].models.map(m => `<option value="${m}">${esc(m)}</option>`).join('');
    });
    $('#fk-load-llm') && ($('#fk-load-llm').onclick = () => {
      const m = $('#fk-model').value;
      loadWebLLM(m);
    });
    $('#fk-mesh-toggle').onclick = () => {
      if (STATE.mesh.active) { STATE.mesh.bc?.close(); STATE.mesh.active = false; STATE.mesh.bc = null; notify('Mesh disconnected'); }
      else meshStart({ seedName: STATE.config.seedName || 'seed' });
      openSettings();  // refresh modal
    };
    $('#fk-save').onclick = () => {
      STATE.config.ai_tier = $('#fk-tier').value;
      if ($('#fk-model')) STATE.config.webllm_model = $('#fk-model').value;
      if ($('#fk-provider')) STATE.config.api_provider = $('#fk-provider').value;
      if ($('#fk-api-model')) STATE.config.api_model = $('#fk-api-model').value;
      const newKey = $('#fk-key')?.value;
      if (newKey) STATE.config.api_key = newKey;
      saveConfig(); renderAiChip(); notify('Saved', 'ok'); closeSettings();
    };
  }
  function closeSettings() { const bg = $('#fk-modal-bg'); if (bg) bg.remove(); }

  // ─── Help section (returns HTML string for inclusion in seed Help tabs) ───
  function helpSection() {
    return `<div style="background:rgba(192,138,58,.05);border:1px solid #3a342c;border-radius:4px;padding:18px 22px;margin:14px 0">
      <h4 style="font-family:Georgia,serif;font-size:15px;color:#c08a3a;margin-bottom:12px">◊ AI cascade · the 3 tiers</h4>
      <p style="font-size:13px;color:#a89e88;line-height:1.7;margin-bottom:10px">This seed runs fully without AI (<strong style="color:#c08a3a">T0</strong>, default). Enable a tier in settings if you want AI-assist features:</p>
      <table style="width:100%;border-collapse:collapse;font-size:12.5px">
        <thead><tr><th style="padding:6px 10px;text-align:left;background:rgba(0,0,0,.2);font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#a89e88;letter-spacing:.08em;text-transform:uppercase">Tier</th><th style="padding:6px 10px;text-align:left;background:rgba(0,0,0,.2);font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#a89e88;letter-spacing:.08em;text-transform:uppercase">What it is</th></tr></thead>
        <tbody>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T0</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">Off. The seed works fully. No AI · no downloads · no API calls.</td></tr>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T2</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">WebLLM in-browser. Pick a model: 1B (700MB, fast) → 3B (2GB, balanced) → 7B (5GB, capable) → 70B (40GB, frontier). One-time download, runs offline forever after. Zero data leaves your device.</td></tr>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T3</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">BYOK · Anthropic Claude · OpenAI GPT · Google Gemini. You bring the API key, you pay the provider direct. Key stays in your browser, sent direct to the provider, never proxied.</td></tr>
        </tbody>
      </table>
      <p style="font-size:12px;color:#6e6a5e;line-height:1.6;margin-top:10px">Open the AI chip in the header to switch tier or check status. Cross-seed mesh activates a BroadcastChannel on <code style="background:#1a1922;padding:1px 5px;border-radius:2px">${MESH_CHANNEL}</code> so other estate seeds on the same device discover this one.</p>
    </div>`;
  }

  // ─── CSS for AI chip ─────────────────────────────────────────────
  function injectCss() {
    if (document.getElementById('fk-css')) return;
    const s = document.createElement('style');
    s.id = 'fk-css';
    s.textContent = `
      #fk-ai-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 9px; border-radius:3px; font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; cursor:pointer; border:1px solid #3a342c; background:#1a1922; color:#a89e88; user-select:none; vertical-align:middle }
      #fk-ai-chip:hover { border-color:#c08a3a; color:#ebe3d2 }
      #fk-ai-chip.fk-chip-live { border-color:#6b8d4a; color:#6b8d4a; background:rgba(107,141,74,.10) }
      #fk-ai-chip.fk-chip-loading { border-color:#e8a83a; color:#e8a83a; background:rgba(232,168,58,.10) }
      #fk-ai-chip.fk-chip-warn { border-color:#a14a2a; color:#a14a2a; background:rgba(161,74,42,.08) }
      #fk-ai-chip .fk-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0 }
      #fk-ai-chip.fk-chip-loading .fk-dot { animation:fk-pulse 1s infinite }
      @keyframes fk-pulse { 0%,100%{opacity:1}50%{opacity:.3} }
      .fk-ai-assist { display:inline-flex; align-items:center; gap:5px; padding:4px 9px; font-size:11px; border:1px solid #c08a3a; color:#c08a3a; background:transparent; border-radius:3px; cursor:pointer; font-family:inherit }
      .fk-ai-assist:hover { background:#c08a3a; color:#0a0a0a }
      .fk-ai-assist::before { content:'✦'; font-size:12px }
    `;
    document.head.appendChild(s);
  }

  // ─── Init ────────────────────────────────────────────────────────
  function init(opts) {
    opts = opts || {};
    injectCss();
    if (opts.seedName) STATE.config.seedName = opts.seedName;
    if ($('#fk-ai-chip')) { renderAiChip(); return { version: FALL_KIT_VERSION, mounted: false }; }
    const chip = document.createElement('button');
    chip.id = 'fk-ai-chip';
    chip.title = 'AI cascade · click to configure tier and model';
    chip.innerHTML = '<span class="fk-dot"></span><span id="fk-ai-chip-text">T0 · off</span>';
    chip.onclick = openSettings;
    // Try anchor first, fall back to floating bottom-right
    const anchor = opts.chipAnchor ? $(opts.chipAnchor) : null;
    if (anchor) { anchor.appendChild(chip); }
    else {
      chip.style.cssText += ';position:fixed;bottom:14px;left:14px;z-index:9998;box-shadow:0 4px 14px rgba(0,0,0,.4)';
      document.body.appendChild(chip);
    }
    renderAiChip();
    return { version: FALL_KIT_VERSION, mounted: true };
  }

  // ─── Public API ──────────────────────────────────────────────────
  root.FallKit = {
    version: FALL_KIT_VERSION,
    init: init,
    aiTier: aiTier,
    aiComplete: aiComplete,
    loadWebLLM: loadWebLLM,
    openSettings: openSettings,
    closeSettings: closeSettings,
    renderAiChip: renderAiChip,
    helpSection: helpSection,
    meshStart: meshStart,
    meshPost: meshPost,
    notify: notify,
    MODELS: WEBLLM_MODELS,
    PROVIDERS: T3_PROVIDERS,
    state: STATE,
  };
})(typeof window !== 'undefined' ? window : globalThis);

</script>

    function go() { if (typeof FallKit !== 'undefined') FallKit.init({ seedName: "fallvetpaper" }); }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
    else go();
  })();
</script>

<script>

let state={active:'templates',firm:null,clients:[],documents:[],audit:[],
  ui:{selectedTemplate:null,selectedClient:null,editingSections:{},extraContext:'',chat:[]},
  settings:{anthropicKey:'',auditChain:true}};

const $=(s,p=document)=>p.querySelector(s);const uid=p=>(p||'')+'_'+Math.random().toString(36).slice(2,11);const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dateStr=ts=>{if(!ts)return '—';return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})};
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;['state','audit','clients','firms','documents'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='state'?undefined:'id'})})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=rej})}
function idbGetAll(s){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([])})}
function idbGet(s,k){return new Promise(res=>{const tx=db.transaction(s,'readonly');const q=tx.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null)})}
function idbPut(s,v,k){return new Promise(res=>{const tx=db.transaction(s,'readwrite');const o=tx.objectStore(s);const q=k!=null?o.put(v,k):o.put(v);q.onsuccess=()=>res(true);q.onerror=()=>res(false)})}
async function loadAll(){if(!db)await openDB();const[firms,clients,docs,auditArr,uiState]=await Promise.all([idbGetAll('firms'),idbGetAll('clients'),idbGetAll('documents'),idbGetAll('audit'),idbGet('state','ui')]);state.firm=firms[0]||null;state.clients=clients;state.documents=docs;state.audit=auditArr.sort((a,b)=>a.i-b.i);if(uiState){state.ui=Object.assign({},state.ui,uiState.value||{});state.settings=Object.assign({},state.settings,uiState.settings||{})}}
async function persistUI(){await idbPut('state',{value:{...state.ui},settings:state.settings},'ui')}
async function auditLog(action,opts={}){if(!state.settings.auditChain)return;const prev=state.audit.length?state.audit[state.audit.length-1]:null;const i=(prev?prev.i:0)+1;const entry={id:uid('au'),i,ts:now(),tool:TOOLNAME,action,reasoning:opts.reasoning||'',configVersion:TOOLNAME+'@'+VERSION,prevHash:prev?.docHash||'',docHash:'',payload:opts.payload||{}};entry.docHash=await sha256(JSON.stringify({i,ts:entry.ts,action,prevHash:entry.prevHash,payload:entry.payload}));state.audit.push(entry);await idbPut('audit',entry)}

let bcVet,bcSignal;
function initMesh(){try{bcSignal=new BroadcastChannel('fall-signal');bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()})}catch(e){}try{bcVet=new BroadcastChannel('fall-vet');bcVet.addEventListener('message',async e=>{const m=e.data;if(!m||m.source===TOOLNAME)return;if(m.type==='sync.snapshot'){const p=m.payload||{};if(Array.isArray(p.clients))for(const c of p.clients){if(!state.clients.find(x=>x.id===c.id)){state.clients.push(c);await idbPut('clients',c)}}if(p.firm&&!state.firm){state.firm=p.firm;await idbPut('firms',p.firm)}render()}});bcVet.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME})}catch(e){}}

function buildContext(){
  const f=state.firm||{};const cl=state.ui.selectedClient?state.clients.find(c=>c.id===state.ui.selectedClient):null;
  const map={'practice.name':f.name||'','practice.address':f.address||'','practice.phone':f.phone||'','practice.email':f.email||''};
  if(cl){map['client.name']=cl.ownerName||((cl.title||'')+' '+(cl.firstName||'')+' '+(cl.lastName||'')).trim()||'';map['client.phone']=cl.phone||'';map['client.address']=cl.address||'';
    const a=(cl.animals||[])[0]||{};map['animal.name']=a.name||'';map['animal.species']=a.species||'';map['animal.breed']=a.breed||'';map['animal.age']=a.age||'';map['animal.sex']=a.sex||'';map['animal.neutered']=a.neutered||'';map['animal.microchip']=a.microchip||'';map['animal.dob']=a.dob||'';map['animal.colour']=a.colour||''}
  const extra=(state.ui.extraContext||'').split('\n');for(const line of extra){const eq=line.indexOf('=');if(eq>0)map['ctx.'+line.slice(0,eq).trim()]=line.slice(eq+1).trim()}
  return map;
}
function resolveText(text,ctx){return text.replace(/\{\{([^}]+)\}\}/g,(_,key)=>{const v=ctx[key.trim()];return v!=null&&v!==''?String(v):`<span class="placeholder-empty">{{${key.trim()}}}</span>`})}
function renderPaper(tpl,ctx,sections){return `<div class="doc-meta">${esc(tpl.name)} · ${esc(tpl.code)} · ${TOOLNAME} · ${dateStr(now())}</div>\n`+sections.map(s=>{const text=state.ui.editingSections?.[s.id]??s.text;const html=resolveText(text,ctx);if(s.locked)return `<div class="clause-locked">${mdB(html)}</div>`;return mdB(html)}).join('\n')}
function mdB(md){return md.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n(\d+\.\s)/g,'<br>$1').replace(/\n-\s/g,'<br>• ').replace(/☐/g,'<span style="font-size:16px">☐</span>').replace(/\[SIGNATURE_BLOCK\]/g,'<div class="sig-block"><div><div class="sig-line"></div>Signed (Vet)</div><div><div class="sig-line"></div>Signed (Owner)</div></div>').replace(/^/,'<p>').replace(/$/,'</p>')}

function render(){$('#tabNav').innerHTML=TABS.map(t=>`<button class="${state.active===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');const v=$('#view');switch(state.active){case 'templates':return renderTemplates(v);case 'generate':return renderGenerate(v);case 'documents':return renderDocuments(v);case 'practice':return renderPractice(v);case 'clients':return renderClients(v);case 'qa':return renderQA(v)}}
function switchTab(id){state.active=id;persistUI();render()}

function renderTemplates(v){const cats=[...new Set(TEMPLATE_DEFS.map(t=>t.cat))];v.innerHTML=`<div class="disclaimer"><strong>◊ Regulatory notice:</strong> FallVetPaper generates veterinary clinical documents shaped by the Veterinary Surgeons Act 1966, RCVS Code of Professional Conduct, and Misuse of Drugs Regulations 2001. Locked clauses contain regulatory wording. All clinical decisions remain the responsibility of the attending MRCVS. Data never leaves this device.</div><div class="section-h"><h2>Templates</h2><div class="sub">${TEMPLATE_DEFS.length} templates</div></div>${cats.map(cat=>`<h3 style="font-family:var(--serif);margin:14px 0 8px;color:var(--brass);text-transform:capitalize">${cat}</h3><div class="tpl-list" style="margin-bottom:14px">${TEMPLATE_DEFS.filter(t=>t.cat===cat).map(t=>`<div class="tpl-row" onclick="selectTemplate('${t.id}')"><div><div class="nm">${esc(t.name)}</div><div class="sub">${esc(t.code)} · ${esc(t.desc)}</div></div><div class="sub">${t.sections.length} sections</div></div>`).join('')}</div>`).join('')}`}
function selectTemplate(id){state.ui.selectedTemplate=id;state.ui.editingSections={};state.active='generate';persistUI();render()}
function renderGenerate(v){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl){v.innerHTML='<div class="empty">Select a template from the Templates tab.</div>';return}const ctx=buildContext();v.innerHTML=`<div class="section-h"><h2>${esc(tpl.name)}</h2><div class="actions"><button class="btn brass sm" onclick="saveDocument('draft')">Save draft</button><button class="btn sm" style="border-color:var(--green);color:var(--green)" onclick="saveDocument('issued')">Issue</button><button class="btn ghost sm" onclick="printDoc()">Print</button></div></div><div class="doc-stage"><div class="doc-side"><div class="card"><h3>Client/Animal</h3><select id="clientSelect" style="width:100%" onchange="state.ui.selectedClient=this.value;persistUI();render()"><option value="">— select —</option>${state.clients.map(c=>{const n=c.ownerName||((c.title||'')+' '+(c.firstName||'')+' '+(c.lastName||'')).trim()||c.id.slice(0,8);return `<option value="${c.id}" ${state.ui.selectedClient===c.id?'selected':''}>${esc(n)}</option>`}).join('')}</select></div><div class="card"><h3>Extra Context</h3><textarea id="ctxArea" rows="6" style="width:100%;font-size:11px" oninput="state.ui.extraContext=this.value">${esc(state.ui.extraContext||'')}</textarea><div class="field"><div class="hint">key=value per line</div></div></div><div class="card"><h3>Sections</h3>${tpl.sections.map(s=>`<div class="section-edit ${s.locked?'locked':''}"><div class="hd"><span class="nm">${esc(s.name)}</span><span class="tg">${s.locked?'locked':'editable'}</span></div><textarea rows="4" ${s.locked?'readonly':''} onchange="state.ui.editingSections['${s.id}']=this.value;renderPreview()">${esc(state.ui.editingSections?.[s.id]??s.text)}</textarea></div>`).join('')}</div></div><div><div class="paper" id="paperPreview">${renderPaper(tpl,ctx,tpl.sections)}</div></div></div>`}
function renderPreview(){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl)return;const pp=$('#paperPreview');if(pp)pp.innerHTML=renderPaper(tpl,buildContext(),tpl.sections)}
async function saveDocument(status){const tpl=TEMPLATE_DEFS.find(t=>t.id===state.ui.selectedTemplate);if(!tpl){toast('No template');return}const content=renderPaper(tpl,buildContext(),tpl.sections);const hash=await sha256(content);const doc={id:uid('doc'),templateId:tpl.id,templateName:tpl.name,code:tpl.code,clientId:state.ui.selectedClient||'',status,content,hash:hash.slice(0,16),createdAt:now(),sections:{...state.ui.editingSections},extraContext:state.ui.extraContext||''};state.documents.push(doc);await idbPut('documents',doc);await auditLog('document.'+status,{reasoning:tpl.name,payload:{docId:doc.id,hash:doc.hash}});toast(status==='issued'?'Issued':'Draft saved');persistUI();render()}
function printDoc(){const pp=$('#paperPreview');if(!pp)return;const w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><title>Print</title><style>body{font-family:Georgia,serif;font-size:13px;line-height:1.7;padding:40px 60px;color:#1a1611}strong{font-weight:700}.clause-locked{background:#f5f0e0;border-left:3px solid #8b1a1a;padding:8px 12px;margin:8px 0;font-size:12px}.sig-block{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:30px}.sig-line{border-bottom:1px solid #000;min-height:38px;margin-bottom:4px}@media print{body{padding:20px}}</style></head><body>'+pp.innerHTML+'</body></html>');w.document.close();w.print()}
function renderDocuments(v){const docs=state.documents.sort((a,b)=>b.createdAt-a.createdAt);v.innerHTML=`<div class="section-h"><h2>Documents</h2><div class="sub">${docs.length}</div></div>${docs.length?`<table><thead><tr><th>Date</th><th>Template</th><th>Code</th><th>Status</th><th>Hash</th></tr></thead><tbody>${docs.map(d=>`<tr><td>${dateStr(d.createdAt)}</td><td>${esc(d.templateName)}</td><td>${esc(d.code)}</td><td><span class="pill ${d.status}">${d.status}</span></td><td style="font-family:var(--mono);font-size:10px;color:var(--cream-muted)">${esc(d.hash)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No documents.</div>'}`}
function renderPractice(v){const f=state.firm||{};v.innerHTML=`<div class="section-h"><h2>Practice Setup</h2></div><div class="card" style="max-width:620px"><div class="row"><div class="field"><label>Practice name</label><input id="fName" value="${esc(f.name||'')}"></div><div class="field"><label>Email</label><input id="fEmail" value="${esc(f.email||'')}"></div></div><div class="field"><label>Address</label><input id="fAddr" value="${esc(f.address||'')}"></div><div class="row"><div class="field"><label>Phone</label><input id="fPhone" value="${esc(f.phone||'')}"></div><div class="field"><label>RCVS Practice no</label><input id="fRcvs" value="${esc(f.rcvsNumber||'')}"></div></div><button class="btn brass" onclick="savePracticeForm()" style="margin-top:8px">Save</button></div>`}
async function savePracticeForm(){const f=state.firm||{id:uid('fi'),ts:now()};f.name=$('#fName').value.trim();f.email=$('#fEmail').value.trim();f.address=$('#fAddr').value.trim();f.phone=$('#fPhone').value.trim();f.rcvsNumber=$('#fRcvs').value.trim();f.updatedAt=now();state.firm=f;await idbPut('firms',f);await auditLog('practice.saved');toast('Saved');render()}
function renderClients(v){v.innerHTML=`<div class="section-h"><h2>Clients</h2><div class="sub">${state.clients.length}</div></div>${state.clients.length?`<table><thead><tr><th>Owner</th><th>Animal</th><th>Species</th></tr></thead><tbody>${state.clients.map(c=>{const n=c.ownerName||((c.title||'')+' '+(c.firstName||'')+' '+(c.lastName||'')).trim()||c.id.slice(0,8);const a=(c.animals||[])[0]||{};return `<tr><td>${esc(n)}</td><td>${esc(a.name||'—')}</td><td>${esc(a.species||'—')}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">Clients sync from fallvetonboard.</div>'}`}

const T0_QA=[
  {q:/consent|informed|owner/i,a:'RCVS Code of Professional Conduct (Chapter 11): obtain informed consent before treatment. Explain: diagnosis, prognosis, treatment options, risks, costs. Consent should be documented. Emergency: treat without consent if in the animal\'s best interest and owner cannot be contacted. Under 16: parental consent required. Non-owner presenting: establish authority to consent.'},
  {q:/euthanasia|put.?down|pts/i,a:'Animal Welfare Act 2006: euthanasia must be carried out humanely. RCVS: euthanasia is a clinical decision — can refuse if not in the animal\'s interest, but cannot refuse if animal is suffering and no alternative. Methods: IV barbiturate injection (pentobarbitone). Schedule 2 CD — record in register. Owner consent should be documented. Remains: offer individual/communal cremation or owner to take home.'},
  {q:/controlled.?drug|cd|schedule|register/i,a:'Misuse of Drugs Regulations 2001: vets can possess, supply, and administer Schedule 2-5 CDs. Schedule 2 (ketamine, methadone, morphine, pethidine): bound register, safe storage (BS2881), running balance, annual stockcheck, destruction witnessed. Schedule 3 (buprenorphine, midazolam): safe custody required, no register needed. Schedule 4 (diazepam, zolazepam): invoice records only. Quarterly reconciliation recommended by RCVS.'},
  {q:/referral|specialist|second.?opinion/i,a:'RCVS Code 3: client has right to seek a second opinion or referral. Vet should refer when case is beyond competence. Referral letter should include: signalment, history, clinical findings, diagnostics, treatment to date, reason for referral. Referral does not transfer clinical responsibility until the referral practice accepts the case. Referral fees are the client\'s responsibility.'},
  {q:/vaccination|vaccine|titre/i,a:'WSAVA vaccination guidelines: core vaccines (dogs: DHP; cats: FPV, FHV, FCV) — primary course + 12-month booster, then every 3 years. Non-core based on risk. Titre testing available as alternative to booster vaccination. Rabies: required for APHA Pet Passport (travel). No UK legal requirement for vaccination (unlike some countries). Record batch number, expiry, and site.'},
  {q:/insurance|claim|pre.?existing/i,a:'Vet completes the clinical section of the insurance claim form. Must be accurate and complete. Pre-existing conditions: must disclose to insurer. Common issues: policy exclusions, excess, co-payment, annual/lifetime limits. Direct claims: some insurers pay practice directly. Vet cannot refuse to complete a claim form. Fee chargeable for completion. Fraud Act 2006 applies to false claims.'},
  {q:/rcvs|code|conduct|fitness/i,a:'RCVS (Royal College of Veterinary Surgeons) regulates the veterinary profession. Code of Professional Conduct: 10 principles. Fitness to Practise: disciplinary committee can warn, suspend, or remove from register. Annual renewal fee required. Practice Standards Scheme: voluntary accreditation (Core, GP, Hospital). CPD: minimum 35 hours over 3 years (RCVS requirement).'},
  {q:/record|clinical|notes|soap/i,a:'RCVS requires adequate clinical records. SOAP format recommended: Subjective (history), Objective (examination), Assessment (diagnosis), Plan (treatment). Records must include: date, animal ID, owner, clinical findings, treatment, medications dispensed, consent obtained. Retain for minimum 7 years. Digital records: must be backed up. Records belong to the practice, not the client — but client has right to request copies.'},
];
function askT0(q){for(const r of T0_QA){if(r.q.test(q))return {answer:r.a,source:'T0 · UK veterinary rules'}}return null}
async function askT3(q){if(!state.settings.anthropicKey)return null;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.settings.anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'You are a UK veterinary practice expert. RCVS, VSA 1966, controlled drugs, animal welfare. Concise.\n\n'+q}]})});if(!res.ok)return null;const j=await res.json();return {answer:j.content?.[0]?.text,source:'T3 · Anthropic'}}catch(e){return null}}
function renderQA(v){v.innerHTML=`<div class="section-h"><h2>Q & A</h2><div class="sub">T0 + T3 BYOK</div></div><div class="card" style="max-width:780px"><div class="chat" id="chatBox">${(state.ui.chat||[]).map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}</div><div class="chat-input"><input id="chatIn" placeholder="Ask… 'CD register requirements?' · 'euthanasia consent?' · 'RCVS CPD?'" onkeydown="if(event.key==='Enter')askQ()"><button class="btn brass" onclick="askQ()">Ask</button></div></div>`;const box=$('#chatBox');if(box)box.scrollTop=box.scrollHeight}
async function askQ(){const inp=$('#chatIn');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';if(!state.ui.chat)state.ui.chat=[];state.ui.chat.push({role:'user',text:q});render();let r=askT0(q);if(!r)r=await askT3(q);state.ui.chat.push(r?{role:'bot',text:r.answer,source:r.source}:{role:'bot',text:'No T0 match. Add BYOK key for T3.',source:'system'});persistUI();render()}

function openModal(type){const modal=$('#modal');$('#modalTitle').textContent='Settings';modal.classList.add('open');$('#modalBody').innerHTML=`<div class="field"><label>Anthropic key (T3)</label><input type="password" id="sKey" value="${esc(state.settings.anthropicKey||'')}"></div><div style="margin:10px 0"><label style="font-size:12px"><input type="checkbox" id="sAudit" ${state.settings.auditChain?'checked':''}> Audit chain</label></div><div class="actions"><button class="btn ghost sm" onclick="exportAll()">Export</button><button class="btn ghost sm" onclick="importAll()">Import</button><button class="btn danger sm" onclick="wipeAll()">Wipe</button><button class="btn brass" onclick="saveSettings()">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`}
function closeModal(){$('#modal').classList.remove('open')}
function saveSettings(){state.settings.anthropicKey=$('#sKey').value.trim();state.settings.auditChain=$('#sAudit').checked;$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';persistUI();closeModal();toast('Saved');render()}
function exportAll(){const d={tool:TOOLNAME,v:VERSION,ts:now(),firm:state.firm,clients:state.clients,documents:state.documents};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fallvetpaper-export.json';a.click();URL.revokeObjectURL(u);toast('Exported')}
function importAll(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async()=>{const f=inp.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.firm){state.firm=d.firm;await idbPut('firms',d.firm)}for(const k of['clients','documents']){if(Array.isArray(d[k]))for(const r of d[k]){state[k].push(r);await idbPut(k,r)}}persistUI();toast('Imported');render()}catch(e){toast('Failed')}};inp.click()}
async function wipeAll(){if(!confirm('Wipe ALL data?'))return;for(const s of['clients','firms','documents','audit','state']){const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();await new Promise(r=>{tx.oncomplete=r})}location.reload()}

async function seedDemo(){if(state.clients.length||state.firm)return;
  const firm={id:uid('fi'),name:'Demo Veterinary Practice',address:'3 Green Lane, London SW6 4AB',email:'info@demovets.co.uk',phone:'020 7890 1234',rcvsNumber:'XVP-12345',updatedAt:now(),isDemo:true};
  state.firm=firm;await idbPut('firms',firm);
  const c1={id:uid('cl'),ownerName:'Sarah Mitchell',phone:'07700 900111',email:'s.mitchell@email.co.uk',address:'42 Park Road, London SW6 5QR',animals:[{name:'Max',species:'Dog',breed:'Labrador Retriever',age:'6 years',sex:'Male',neutered:'Yes',microchip:'981234567890123',colour:'Golden',dob:'2020-03-15'}],ts:now(),isDemo:true};
  const c2={id:uid('cl'),ownerName:'David Chen',phone:'07700 900222',email:'d.chen@email.co.uk',address:'15 Elm Street, London SW6 3TT',animals:[{name:'Luna',species:'Cat',breed:'British Shorthair',age:'3 years',sex:'Female',neutered:'Yes',microchip:'981987654321098',colour:'Blue',dob:'2023-01-10'}],ts:now(),isDemo:true};
  state.clients.push(c1,c2);await idbPut('clients',c1);await idbPut('clients',c2);
  await auditLog('demo.seeded',{reasoning:'first boot'});await persistUI()}

(async function boot(){try{await openDB();await loadAll();await seedDemo();initMesh();$('#tierBadge').textContent=state.settings.anthropicKey?'T3':'T0';render()}catch(e){console.error('[fallvetpaper] boot error:',e);document.getElementById('view').innerHTML='<div class="empty">Boot error: '+esc(e.message)+'</div>'}})();
</script>
